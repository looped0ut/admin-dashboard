<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  
    <div class="container">

        <div class="header">
            
            <div class="top">
                <div class="search">
                    <label for="search_bar"><img src="./icons/search.svg" alt="Search"></label>
                    <input type="search" name="search_bar" id="search_bar">
                </div>
                
                <div class="not">
                    <img src="./icons/notification.svg" alt="notification">
                    <img src="./icons/head.svg" alt="user">
                    <span>Navaneeth</span>
                </div>
            </div>

            <div class="bottom">
                <div class="user">
                    <img src="./icons/head.svg" alt="user">
                    <div class="salutation">
                        <span>Hi there,</span>
                        <div>Navaneeth (@looped0ut)</div>
                    </div>
                </div>

                <div class="buttons">
                    <button type="button">New</button>
                    <button type="button">Upload</button>
                    <button type="button">Share</button>
                </div>
            </div>

        </div>

        <div class="sidebar">

            <div class="dash">
                <img src="./icons/dashboard.svg" alt="Dashboard">
                <span>Dashboard</span>
            </div>

            <div class="explore">
                <div class="home">
                    <img src="./icons/home.svg" alt="Home">
                    <span>Home</span>
                </div>
                <div class="profile">
                    <img src="./icons/profile.svg" alt="profile">
                    <span>Profile</span>
                </div>
                <div class="message">
                    <img src="./icons/message.svg" alt="Message">
                    <span>Messages</span>
                </div>
                <div class="history">
                    <img src="./icons/history.svg" alt="History">
                    <span>History</span>
                </div>
                <div class="task">
                    <img src="./icons/tasks.svg" alt="tasks">
                    <span>Tasks</span>
                </div>
                <div class="communities">
                    <img src="./icons/community.svg" alt="communities">
                    <span>Communities</span>
                </div>
            </div>

            <div class="info">
                <div class="settings">
                    <img src="./icons/settings.svg" alt="settings">
                    <span>Settings</span>
                </div>
                <div class="support">
                    <img src="./icons/help.svg" alt="Support">
                    <span>Support</span>
                </div>
                <div class="privacy">
                    <img src="./icons/privacy.svg" alt="Privacy">
                    <span>Privacy</span>
                </div>
            </div>

        </div>

        <div class="main"></div>
    
    </div>
</body>
</html>
